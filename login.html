<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>FinanIA - Iniciar Sesión</title>
		<style>
			/* ==== Estilos generales ==== */
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: "Segoe UI", Arial, sans-serif;
			}

			body {
				background: linear-gradient(to bottom right, #004481, #0074c1);
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				color: #333;
			}

			/* ==== Contenedor del login ==== */
			.login-container {
				background: white;
				border-radius: 16px;
				box-shadow: 0 5px 15px rgba(0,0,0,0.2);
				width: 350px;
				padding: 40px;
				text-align: center;
			}

			.login-container h2 {
				color: #004481;
				margin-bottom: 20px;
			}

			.login-container img {
				width: 80px;
				margin-bottom: 10px;
			}

			/* ==== Inputs ==== */
			.input-group {
				text-align: left;
				margin-bottom: 20px;
			}

			.input-group label {
				display: block;
				font-weight: 600;
				color: #004481;
				margin-bottom: 6px;
			}

			.input-group input {
				width: 100%;
				padding: 10px;
				border: 2px solid #dcdcdc;
				border-radius: 8px;
				transition: 0.3s;
			}

			.input-group input:focus {
				border-color: #0074c1;
				outline: none;
			}

			/* ==== Botón ==== */
			.btn {
				width: 100%;
				background-color: #ffd100;
				color: #004481;
				border: none;
				padding: 10px;
				border-radius: 8px;
				font-size: 1em;
				font-weight: bold;
				cursor: pointer;
				transition: 0.3s;
			}

			.btn:hover {
				background-color: #e6b800;
			}

			/* ==== Enlaces ==== */
			.links {
				margin-top: 15px;
			}

			.links a {
				color: #0074c1;
				text-decoration: none;
				font-size: 0.9em;
			}

			.links a:hover {
				text-decoration: underline;
			}

			/* ==== Adaptable ==== */
			@media (max-width: 400px) {
				.login-container {
					width: 90%;
					padding: 25px;
				}
			}
		</style>
		<!-- Icono pagina-->
		
	</head>
	<body>
		<div class="login-container">
			<img src="finanIA.jpeg" alt="Logo FinanIA">
			<h2>Iniciar Sesión</h2>
			<form id="loginForm">
				<div class="input-group">
					<label for="email">Correo electrónico</label>
					<input type="email" id="email" name="email" placeholder="Ingresa tu correo" required>
				</div>
				<div class="input-group">
					<label for="password">Contraseña</label>
					<input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
				</div>
				<div id="errorMessage" style="color: #dc3545; font-size: 0.9em; margin-bottom: 10px; display: none;"></div>
				<button type="submit" class="btn">Ingresar</button>
			</form>
			<div class="links">
				<a href="recuperar_password.html">¿Olvidaste tu contraseña?</a><br>
				<a href="crear_Cuenta.html">Crear cuenta nueva</a>
			</div>
		</div>
		<script>
			const API_BASE_URL = 'http://localhost:5000/api';
			if (localStorage.getItem('authToken')) {
				window.location.href = 'dashboard.html';
			}
			document.getElementById('loginForm').addEventListener('submit', async function(e) {
				e.preventDefault();
				const email = document.getElementById('email').value;
				const password = document.getElementById('password').value;
				const errorMessage = document.getElementById('errorMessage');
				try {
					const response = await fetch(`${API_BASE_URL}/login`, {
						method: 'POST',
						headers: {'Content-Type': 'application/json'},
						body: JSON.stringify({ email, password })
					});
					const data = await response.json();
					if (response.ok) {
						localStorage.setItem('authToken', data.token);
						localStorage.setItem('currentUser', JSON.stringify(data.usuario));
						// Redirigir según el tipo de usuario
						if (data.usuario.es_administrador) {
							window.location.href = 'admin_dashboard.html';
						} else {
							window.location.href = 'dashboard.html';
						}
					} else {
						errorMessage.textContent = data.error || 'Error al iniciar sesión';
						errorMessage.style.display = 'block';
					}
				} catch (error) {
					errorMessage.textContent = 'Error de conexión. Verifica que el servidor esté ejecutándose.';
					errorMessage.style.display = 'block';
				}
			});
		</script>
	</body>
</html>
