<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Recuperar Contraseña - FinanIA</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "Segoe UI", Arial, sans-serif;
		}

		body {
			background: linear-gradient(to bottom right, #004481, #0074c1);
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			color: #333;
		}

		.login-container {
			background: white;
			border-radius: 16px;
			box-shadow: 0 5px 15px rgba(0,0,0,0.2);
			width: 350px;
			padding: 40px;
			text-align: center;
		}

		.login-container h2 {
			color: #004481;
			margin-bottom: 20px;
		}

		.login-container img {
			width: 80px;
			margin-bottom: 10px;
		}

		.input-group {
			text-align: left;
			margin-bottom: 20px;
		}

		.input-group label {
			display: block;
			font-weight: 600;
			color: #004481;
			margin-bottom: 6px;
		}

		.input-group input {
			width: 100%;
			padding: 10px;
			border: 2px solid #dcdcdc;
			border-radius: 8px;
			transition: 0.3s;
		}

		.input-group input:focus {
			border-color: #0074c1;
			outline: none;
		}

		.btn {
			width: 100%;
			background-color: #ffd100;
			color: #004481;
			border: none;
			padding: 10px;
			border-radius: 8px;
			font-size: 1em;
			font-weight: bold;
			cursor: pointer;
			transition: 0.3s;
		}

		.btn:hover {
			background-color: #e6b800;
		}

		.links {
			margin-top: 15px;
		}

		.links a {
			color: #0074c1;
			text-decoration: none;
			font-size: 0.9em;
		}

		.links a:hover {
			text-decoration: underline;
		}

		.mensaje {
			padding: 12px;
			border-radius: 8px;
			margin-bottom: 15px;
		}

		.mensaje.success {
			background: #d4edda;
			color: #155724;
			border: 1px solid #c3e6cb;
		}

		.mensaje.error {
			background: #f8d7da;
			color: #721c24;
			border: 1px solid #f5c6cb;
		}

		@media (max-width: 400px) {
			.login-container {
				width: 90%;
				padding: 25px;
			}
		}
	</style>
</head>
<body>
	<div class="login-container">
		<img src="finanIA.jpeg" alt="Logo FinanIA">
		<h2>Restablecer Contraseña 🔐</h2>

		<div id="mensaje" class="mensaje" style="display: none;"></div>

		<form id="recuperarForm">
			<div class="input-group">
				<label for="correo">Correo registrado:</label>
				<input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
			</div>
			<div class="input-group">
				<label for="nuevaPassword">Nueva Contraseña:</label>
				<input type="password" id="nuevaPassword" name="nuevaPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
			</div>
			<div class="input-group">
				<label for="confirmarPassword">Confirmar Contraseña:</label>
				<input type="password" id="confirmarPassword" name="confirmarPassword" placeholder="Confirma tu contraseña" required minlength="6">
			</div>
			<button type="submit" class="btn">Actualizar Contraseña</button>
		</form>

		<div class="links">
			<a href="login.html">Volver al inicio de sesión</a>
		</div>
	</div>

	<script>
		const API_BASE_URL = 'http://localhost:5000/api';
		document.getElementById('recuperarForm').addEventListener('submit', function(e) {
			e.preventDefault();
			const correo = document.getElementById('correo').value.trim();
			const nuevaPassword = document.getElementById('nuevaPassword').value;
			const confirmarPassword = document.getElementById('confirmarPassword').value;
			const mensajeDiv = document.getElementById('mensaje');

			if (nuevaPassword !== confirmarPassword) {
				mensajeDiv.className = 'mensaje error';
				mensajeDiv.style.display = 'block';
				mensajeDiv.textContent = 'Las contraseñas no coinciden.';
				return;
			}

			if (nuevaPassword.length < 6) {
				mensajeDiv.className = 'mensaje error';
				mensajeDiv.style.display = 'block';
				mensajeDiv.textContent = 'La contraseña debe tener al menos 6 caracteres.';
				return;
			}

			fetch(`${API_BASE_URL}/recuperar-password/reset`, {
				method: 'POST',
				headers: {'Content-Type': 'application/json'},
				body: JSON.stringify({ email: correo, password: nuevaPassword })
			})
			.then(async (response) => {
				const data = await response.json();
				if (!response.ok) {
					throw new Error(data.error || 'Error al restablecer la contraseña.');
				}
				return data;
			})
			.then(() => {
				mensajeDiv.className = 'mensaje success';
				mensajeDiv.style.display = 'block';
				mensajeDiv.textContent = '✅ Contraseña actualizada exitosamente. Redirigiendo al login...';
				setTimeout(() => {
					window.location.href = 'login.html';
				}, 2000);
			})
			.catch((error) => {
				mensajeDiv.className = 'mensaje error';
				mensajeDiv.style.display = 'block';
				mensajeDiv.textContent = error.message || 'Error de conexión. Verifica que el servidor esté ejecutándose.';
			});
		});
	</script>
</body>
</html>
